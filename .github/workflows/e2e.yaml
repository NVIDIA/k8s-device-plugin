name: End-to-end Tests

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      golang_version:
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_SSH_KEY:
        required: true
      SLACK_BOT_TOKEN:
        required: true
      SLACK_CHANNEL_ID:
        required: true

jobs:
  e2e-tests:
    runs-on: linux-amd64-cpu4
    steps:
    - name: Check out code
      uses: actions/checkout@v6

    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ inputs.golang_version }}

    - name: Set up Holodeck
      uses: NVIDIA/holodeck@v0.3.2
      with:
        aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws_ssh_key: ${{ secrets.AWS_SSH_KEY }}
        holodeck_config: "tests/e2e/infra/aws.yaml"

    - name: Get public dns name
      id: get_public_dns_name
      uses: mikefarah/yq@v4
      with:
        cmd: yq '.status.properties[] | select(.name == "public-dns-name") | .value' /github/workspace/.cache/holodeck.yaml

    - name: Set test environment
      env:
        PUBLIC_DNS_NAME: ${{ steps.get_public_dns_name.outputs.result }}
      run: |
        echo "instance_hostname=ubuntu@${PUBLIC_DNS_NAME}" >> $GITHUB_ENV
        echo "private_key=${{ github.workspace }}/key.pem" >> $GITHUB_ENV

    - name: Write SSH key
      env:
        AWS_SSH_KEY: ${{ secrets.AWS_SSH_KEY }}
      run: |
        echo "${AWS_SSH_KEY}" > ${private_key} && chmod 400 ${private_key}

    - name: Run e2e tests
      env:
        E2E_IMAGE_REPO: ghcr.io/nvidia/k8s-device-plugin
        E2E_IMAGE_TAG: ${{ inputs.version }}
        E2E_IMAGE_PULL_POLICY: Always
        NVIDIA_DRIVER_ENABLED: true
      run: |
        ./tests/ci-run-e2e.sh ${E2E_IMAGE_REPO} ${E2E_IMAGE_TAG} ${NVIDIA_DRIVER_ENABLED} || rc=$?
        ./tests/scripts/pull.sh /tmp/logs logs
        exit $rc
    - name: Archive test logs
      if: ${{ failure() }}
      uses: actions/upload-artifact@v7
      with:
        name: e2e-test-logs
        path: ./logs/
        retention-days: 15

    - name: Archive Ginkgo logs
      uses: actions/upload-artifact@v7
      with:
        name: ginkgo-logs
        path: ginkgo.json
        retention-days: 15

    - name: Send Slack alert notification
      id: slack
      if: false
      uses: slackapi/slack-github-action@v3.0.2
      env:
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        SUMMARY_URL: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}
      with:
        method: chat.postMessage
        token: ${{ secrets.SLACK_BOT_TOKEN }}
        payload: |
          channel: ${{ secrets.SLACK_CHANNEL_ID }}
          text: ":x: On repository ${{ github.repository }} the Workflow *${{ github.workflow }}* has failed.

          Details: ${{ env.SUMMARY_URL }}"
